<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICKSTER TV | Live Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --green: #00E676;
            --bg: #05080a;
            --card: #0f141a;
            --input: #161d24;
            --text-grey: #94a3b8;
            --accent: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg); color: white; overflow-x: hidden; padding-bottom: 90px; }
        .hidden { display: none !important; }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; position: sticky; top: 0; background: rgba(5, 8, 10, 0.9);
            backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(0, 230, 118, 0.1);
        }
        .brand { color: var(--green); font-weight: 800; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- VIDEO PLAYER MODAL (MUHIMU: Z-INDEX 9999) --- */
        #video-modal { 
            position: fixed; inset: 0; background: black; z-index: 9999; 
            display: flex; flex-direction: column; 
        }
        .video-header { 
            padding: 15px; display: flex; justify-content: space-between; 
            align-items: center; background: #0d1117; border-bottom: 1px solid #222;
        }
        #mickster-video { width: 100%; height: auto; max-height: 80vh; background: black; }

        /* --- UI COMPONENTS --- */
        .slider-container { width: 92%; height: 180px; margin: 15px auto; border-radius: 20px; overflow: hidden; position: relative; background: #111; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: 1s; background-size: cover; background-position: center; }
        .slide.active { opacity: 1; }
        
        #auth-overlay, #token-modal { position: fixed; inset: 0; background: rgba(5, 8, 10, 0.98); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 25px; }

        .input-box { background: var(--input); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .btn-green { width: 100%; padding: 16px; background: var(--green); border: none; border-radius: 12px; color: black; font-weight: bold; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px 20px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .thumb { width: 100%; height: 110px; background-size: cover; background-position: center; position: relative; background-color: #222; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #070a0d; display: flex; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        .nav-item { flex: 1; text-align: center; color: var(--text-grey); font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--green); }

        #custom-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 85%; background: var(--green); color: black; padding: 12px; border-radius: 10px; font-weight: bold; z-index: 10000; transition: 0.5s; text-align: center; }
        #custom-alert.show { top: 20px; }
    </style>
</head>
<body>

    <div id="custom-alert">MICKSTER TV ⚡</div>

    <div id="video-modal" class="hidden">
        <div class="video-header">
            <h3 id="playing-now" style="color:var(--green); font-size:14px;">LIVE STREAM</h3>
            <i class="fa-solid fa-xmark" onclick="closePlayer()" style="font-size:24px; cursor:pointer;"></i>
        </div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center; background:black;">
            <video id="mickster-video" controls playsinline></video>
        </div>
    </div>

    <div id="auth-overlay" class="hidden">
        <div style="width:100%; max-width:350px;">
            <h1 style="color:var(--green); text-align:center; margin-bottom:30px;">MICKSTER TV</h1>
            <div class="input-box"><input type="text" id="auth-phone" placeholder="Namba ya Simu"></div>
            <div class="input-box"><input type="password" id="auth-pass" placeholder="Nywila"></div>
            <button class="btn-green" onclick="handleAuth()">INGIA</button>
            <p onclick="toggleAuth(false)" style="text-align:center; margin-top:15px; font-size:13px; color:var(--text-grey);">Funga</p>
        </div>
    </div>

    <div id="token-modal" class="hidden">
        <div style="background:var(--card); padding:30px; border-radius:20px; width:100%; max-width:320px; text-align:center;">
            <h3 style="color:var(--green)">TOKEN INAHITAJIKA</h3>
            <p style="font-size:12px; margin:15px 0; color:var(--text-grey);">Weka token yako iliyo hai kutazama channel hii.</p>
            <div class="input-box"><input type="text" id="modal-token-input" placeholder="MICK-XXXXXX"></div>
            <button class="btn-green" onclick="activateToken()">ACTIVATE</button>
            <p onclick="switchTab('malipo'); document.getElementById('token-modal').classList.add('hidden')" style="margin-top:15px; font-size:11px; cursor:pointer;">Sina Token? Lipia Hapa</p>
        </div>
    </div>

    <header>
        <div class="brand">MICKSTER TV</div>
        <div onclick="switchTab('wasifu')"><i class="fa-regular fa-user" style="color:var(--green); font-size:20px;"></i></div>
    </header>

    <main>
        <section id="sec-home">
            <div class="slider-container" id="slider-box"></div>
            <div style="padding: 15px; font-weight: bold; border-left: 4px solid var(--green); margin-left: 15px;">LIVE CHANNELS</div>
            <div class="grid" id="main-grid"></div>
        </section>

        <section id="sec-malipo" class="hidden" style="padding:20px;">
            <h2 style="text-align:center;">LIPALA <span style="color:var(--green)">PREMIUM</span></h2>
            <div class="grid" style="grid-template-columns: 1fr; margin-top:20px;">
                <div class="card" style="padding:20px; text-align:center;" onclick="processPayment()">
                    <h3>Kifurushi cha Siku 3</h3>
                    <h2 style="color:var(--green)">1,000/-</h2>
                    <p style="font-size:12px; margin-top:10px;">Bonyeza hapa kulipia via WhatsApp</p>
                </div>
            </div>
        </section>

        <section id="sec-wasifu" class="hidden" style="padding:30px; text-align:center;">
            <div id="profile-info">
                <i class="fa-solid fa-circle-user" style="font-size:60px; color:var(--green);"></i>
                <h2 id="profile-name" style="margin-top:15px;">...</h2>
                <p id="profile-status" style="margin-bottom:20px;">Token: Haipo</p>
                <button class="btn-green" style="background:#333; color:white;" onclick="logout()">LOGOUT</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><i class="fa-solid fa-house"></i>Home</div>
        <div class="nav-item" id="nav-malipo" onclick="switchTab('malipo')"><i class="fa-solid fa-credit-card"></i>Malipo</div>
        <div class="nav-item" id="nav-wasifu" onclick="switchTab('wasifu')"><i class="fa-solid fa-user"></i>Wasifu</div>
    </nav>

    <script>
        const SUPABASE_URL = 'https://vcioivanuhqqucipdoge.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_BJXwjHQLipzLDk3vgki8TQ_3PiiOjl2'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLoggedIn = localStorage.getItem('mickster_user') ? true : false;
        let myDeviceId = localStorage.getItem('mickster_device_id') || 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('mickster_device_id', myDeviceId);

        // --- PLAYER ENGINE ---
        function playM3U8(url, name) {
            const video = document.getElementById('mickster-video');
            const modal = document.getElementById('video-modal');
            document.getElementById('playing-now').innerText = name;
            
            modal.classList.remove('hidden');

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {
                        video.muted = true;
                        video.play();
                        showAlert("Bonyeza kioo kupata sauti");
                    });
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        function closePlayer() {
            const video = document.getElementById('mickster-video');
            video.pause();
            video.src = "";
            document.getElementById('video-modal').classList.add('hidden');
        }

        // --- CORE FUNCTIONS ---
        async function loadChannels() {
            const { data } = await _supabase.from('channels').select('*');
            const grid = document.getElementById('main-grid'); 
            grid.innerHTML = "";
            if(data) {
                data.forEach(c => {
                    grid.innerHTML += `<div class="card" onclick="checkAndOpen('${c.channel_name}', '${c.stream_url}')">
                        <div class="thumb" style="background-image:url('${c.icon_url || 'https://via.placeholder.com/150'}')"></div>
                        <div style="padding:10px; font-size:12px;">${c.channel_name}</div>
                    </div>`;
                });
            }
        }

        async function checkAndOpen(name, url) {
            if(!isLoggedIn) { switchTab('wasifu'); toggleAuth(true); return; }
            
            const activeToken = localStorage.getItem('mickster_active_token');
            if(!activeToken) { document.getElementById('token-modal').classList.remove('hidden'); return; }

            // Validate with Supabase
            const { data, error } = await _supabase.from('tokens').select('expiry_date').eq('key', activeToken).single();
            
            if(data && new Date() < new Date(data.expiry_date)) {
                playM3U8(url, name);
            } else {
                localStorage.removeItem('mickster_active_token');
                showAlert("Token imeisha au haipo!");
                document.getElementById('token-modal').classList.remove('hidden');
            }
        }

        // --- AUTH & UI ---
        async function handleAuth() {
            const phone = document.getElementById('auth-phone').value.trim();
            const pass = document.getElementById('auth-pass').value;
            const { data } = await _supabase.from('profiles').select('*').eq('phone', phone).single();
            if(data && data.password === pass) {
                localStorage.setItem('mickster_user', phone);
                isLoggedIn = true;
                location.reload();
            } else { showAlert("Namba au Nywila imekosewa!"); }
        }

        async function activateToken() {
            const key = document.getElementById('modal-token-input').value.toUpperCase().trim();
            const { data } = await _supabase.from('tokens').select('*').eq('key', key).single();
            if(data && data.status !== 'expired') {
                await _supabase.from('tokens').update({ status: 'used', device_id: myDeviceId }).eq('key', key);
                localStorage.setItem('mickster_active_token', key);
                location.reload();
            } else { showAlert("Token sio sahihi!"); }
        }

        function switchTab(t) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + t).classList.add('active');
        }

        function showAlert(msg) { const a = document.getElementById('custom-alert'); a.innerText = msg; a.classList.add('show'); setTimeout(() => a.classList.remove('show'), 3000); }
        function toggleAuth(show) { document.getElementById('auth-overlay').classList.toggle('hidden', !show); }
        function logout() { localStorage.clear(); location.reload(); }
        function processPayment() { window.open(`https://wa.me/255791139331?text=Nahitaji Token MICKSTER TV`, '_blank'); }

        window.onload = () => { 
            loadChannels(); 
            if(isLoggedIn) {
                document.getElementById('profile-name').innerText = localStorage.getItem('mickster_user');
                const t = localStorage.getItem('mickster_active_token');
                document.getElementById('profile-status').innerText = t ? "Token: Active ✅" : "Token: Haipo";
            }
        };
    </script>
</body>
</html>
